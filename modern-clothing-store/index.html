<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Clothing Store</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Using FontAwesome for icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="#" class="logo" onclick="app.navigate('home')">Wear<span>Style</span></a>
            
            <ul class="nav-links">
                <li><a href="#" onclick="app.filterCategory('all')">All</a></li>
                <li><a href="#" onclick="app.filterCategory('men')">Men</a></li>
                <li><a href="#" onclick="app.filterCategory('women')">Women</a></li>
                <li><a href="#" onclick="app.filterCategory('kids')">Kids</a></li>
            </ul>

            <div class="nav-icons">
                <a href="#" onclick="app.navigate('admin')" title="Admin Panel"><i class="fa-solid fa-user-shield"></i></a>
                <a href="#" onclick="app.navigate('orders')" title="My Orders"><i class="fa-solid fa-box-open"></i></a>
                <div class="cart-icon" onclick="app.toggleCart()">
                    <i class="fa-solid fa-shopping-bag"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
            
            <div class="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="container">
        <!-- Views will be injected here by JavaScript -->
        
        <!-- Home View Template (Hidden by default, used by JS) -->
        <section id="home-view" class="view active">
            <header class="hero">
                <h1>New Arrivals</h1>
                <p>Discover the latest trends in fashion.</p>
            </header>
            
            <div id="product-grid" class="product-grid">
                <!-- Products will be loaded here -->
            </div>
        </section>

        <!-- Product Detail View -->
        <section id="product-detail-view" class="view hidden">
            <button class="back-btn" onclick="app.navigate('home')"><i class="fa-solid fa-arrow-left"></i> Back to Shopping</button>
            <div class="product-detail-container" id="product-detail-content">
                <!-- Detail content injected here -->
            </div>
        </section>

        <!-- Orders View -->
        <section id="orders-view" class="view hidden">
             <header class="section-header">
                <h2>Your Orders</h2>
                <button class="back-btn" onclick="app.navigate('home')">Back to Shop</button>
            </header>
            <div id="orders-list" class="orders-list">
                <!-- Orders injected here -->
            </div>
        </section>

        <!-- Admin View -->
        <section id="admin-view" class="view hidden">
             <header class="section-header">
                <h2>Admin Dashboard</h2>
                <p>Manage your products</p>
            </header>
            
            <div class="admin-container">
                <div class="add-product-form card">
                    <h3>Add New Product</h3>
                    <form id="add-product-form">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" id="p-name" required>
                        </div>
                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" id="p-price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="p-category">
                                <option value="men">Men</option>
                                <option value="women">Women</option>
                                <option value="kids">Kids</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="url" id="p-image" placeholder="https://..." required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="p-desc" required></textarea>
                        </div>
                        <button type="submit" class="btn primary">Add Product</button>
                    </form>
                </div>

                <div class="product-management card">
                    <h3>Current Products</h3>
                    <ul id="admin-product-list" class="admin-list">
                        <!-- List to delete items -->
                    </ul>
                </div>
            </div>
        </section>

    </main>

    <!-- Cart Overlay/Modal -->
    <div id="cart-overlay" class="cart-overlay hidden">
        <div class="cart-sidebar">
            <header class="cart-header">
                <h2>Your Cart</h2>
                <button class="close-cart" onclick="app.toggleCart()"><i class="fa-solid fa-xmark"></i></button>
            </header>
            
            <div id="cart-items" class="cart-items">
                <!-- Cart items injected here -->
                <p class="empty-msg">Your cart is empty.</p>
            </div>

            <footer class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button class="btn primary full-width" onclick="app.checkout()">Checkout</button>
            </footer>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">Item added to cart!</div>

    <script src="script.js"></script>
</body>
</html>
